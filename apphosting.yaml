# Firebase App Hosting configuration.
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# App Hosting builds this Next.js app (server-rendered) and runs it on Cloud Run
# behind Firebase's CDN. Rollouts happen when you push to the connected GitHub
# branch (no static "public" folder — this is SSR, not static hosting).

runConfig:
  # Keep the instance ceiling low for an MVP to control cost. Raise as traffic grows.
  maxInstances: 2

# Build- and run-time environment variables.
#  - NEXT_PUBLIC_* values must be available at BUILD time.
#  - Sensitive keys must NOT be inlined here — store them in Cloud Secret Manager
#    and reference them with `secret:` (see commented examples below).
#
# The app builds and runs WITHOUT any of these (it falls back to a keyless
# "preview mode"), so you can deploy the demo first and add keys later.
env:
  - variable: NEXT_PUBLIC_APP_NAME
    value: "Lesson Pack Generator"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_DEFAULT_EXAM_BOARD
    value: "Edexcel"
    availability:
      - BUILD
      - RUNTIME

  # --- Add these when the customer's accounts are ready ---
  # Public (build + runtime):
  # - variable: NEXT_PUBLIC_SUPABASE_URL
  #   value: "https://YOUR-PROJECT.supabase.co"
  #   availability: [BUILD, RUNTIME]
  # - variable: NEXT_PUBLIC_SUPABASE_ANON_KEY
  #   value: "YOUR-ANON-KEY"
  #   availability: [BUILD, RUNTIME]
  # - variable: NEXT_PUBLIC_APP_URL
  #   value: "https://your-domain.com"
  #   availability: [BUILD, RUNTIME]
  #
  # Secrets (runtime only — create with: firebase apphosting:secrets:set NAME):
  # - variable: SUPABASE_SERVICE_ROLE_KEY
  #   secret: supabase-service-role-key
  # - variable: ANTHROPIC_API_KEY
  #   secret: anthropic-api-key
  # - variable: STRIPE_SECRET_KEY
  #   secret: stripe-secret-key
  # - variable: STRIPE_WEBHOOK_SECRET
  #   secret: stripe-webhook-secret
